<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Refreshes Itself</title>
</head>
<body>

    <h1>Page that refreshes itself every 3 seconds</h1>
    <div id="hibye">Page should refresh - or click a button</div>
    <button onclick="sayHi()">Say Hi</button>
    <button onclick="sayBye()">Say bye</button>
    <p><a href="index.html"> BACK </a>

    <script type="text/javascript">   
        // runs on page load - the timeout is a one-time callback,
        // but the page gets reloaded and so sets up a new timeout.
        // setting 'location' to empty string reloads the same page
        // The timeoutId can be used to cancel the timeout;
        // we don't bother b/c the page is going to be reloaded entirely.
        const timeoutId = setTimeout(
            function(){ location = '' },
            3000)

    function sayHi() {
        elt = document.getElementById("hibye")
        elt.textContent = "HI!"
    }
    function sayBye() {
        elt = document.getElementById("hibye")
        elt.textContent = "BYE!"
    }

    </script>


</body>
</html>
