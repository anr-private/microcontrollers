    function fetchDataAndUpdate(theUrl) {
        console.log("fetchDataAndUpdate START FETCH url=" + theUrl);
        fetchDataAsync(theUrl, handleReceivedDataCB);
    }
    function handleReceivedDataCB(data) {
        console.log("hRD: FETCHED DATA:...");
        console.log(data);

        var eltDatetime = document.getElementById('date_time');
        eltDatetime.innerText = `${data.datetime}`;

        const classData = data.classes;
        ////console.log("CLASSDATA"); console.log(classData);
        handleClassesLogStatus(classData);

        /* @@@@@
        const clsNames = Object.keys(classData) 
        console.log("clsNames"); console.log(clsNames);
        // sorts the list in place
        clsNames.sort();
        console.log("clsNames-sorted"); console.log(clsNames);
        
        */
    }
/*
            for (const clsName of clsNames) {
                console.log("clsName: " + clsName);
                const v = classData[clsName];
                console.log("val=" + v);
            }
        }
*/
    function handleClassesLogStatus(classData) {
        ////console.log("CLASSDATA"); console.log(classData);
        const clsNames = Object.keys(classData) 
        ////console.log("clsNames"); console.log(clsNames);
        clsNames.sort(); // sorts in-place
        console.log("clsNames-sorted"); console.log(clsNames);

        for (const clsName of clsNames) {
            console.log("clsName: " + clsName);
            const v = classData[clsName]; // 0 if log disabled, 1 if enabled
            console.log("val=" + v);

            updateOneCheckbox(clsName, v);
        }
    }

    function updateOneCheckbox(clsName, val) {

        const itsId = clsName + "ID";
        console.log("CHECKBOX ID: " + itsId);

        var checkboxElt = document.getElementById(itsId);
        if (checkboxElt == null) {
            console.log("CREATE Checkbox: " + itsId);
            createOneCheckbox(clsName, itsId);
            checkboxElt = document.getElementById(itsId);
        }
        console.log(checkboxElt);

        checkboxElt.checked = (val != 0);
        console.log("checked=" + checkboxElt.checked);
    }

    function  createOneCheckbox(clsName, itsId) {
        const newCheckbox = document.createElement('input');
        newCheckbox.type = 'checkbox';
        newCheckbox.id = itsId;
        newCheckbox.value = clsName+"VALUE";
        newCheckbox.checked = false;

        newCheckbox.addEventListener('click', handleCheckboxClick);
        
        const label = document.createElement("label");
        label.htmlFor = itsId;
        label.appendChild(document.createTextNode(" "+clsName+'TEXT'));
        label.classList.add("whitespace-right-chkbox");

        const divElt = document.getElementById("checkboxes_div");
        if (divElt == null) {
            console.log("CHECKBOX DIV ELT NOT FOUND");
            return;
        }
        divElt.appendChild(newCheckbox);
        divElt.appendChild(label);
    }

    function handleCheckboxClick(event) {
        const checkbox = event.target;
        console.log(`Checkbox with value ${checkbox.value} was clicked.`);
        console.log(`Checkbox with id    ${checkbox.id} was clicked.`);
        console.log(`New checked state: ${checkbox.checked}`);
        let chkd = 0;
        if (checkbox.checked) chkd = 1;
        const url = `${baseLogUrl}&${checkbox.id}=${chkd}`;
        console.log("URL: " + url);
        fetchDataAndUpdate(url);
    }


/*        function updateTheCheckboxes(clsNames) {

        }*/

        function createOneCheckbox_ORIG(clsName) {
            const itsId = clsName + "ID";
            const existingElt = document.getElementById(itsId);
            if (existingElt != null) {
                console.log("Checkbox exists: " + itsId);
                return;
            }
            console.log("NEW CHECKBOX: " + itsId);

            const newCheckbox = document.createElement('input');
            newCheckbox.type = 'checkbox';
            newCheckbox.id = itsId;
            newCheckbox.value = clsName+"VALUE";
            newCheckbox.checked = false;

            newCheckbox.addEventListener('click', handleCheckboxClick);
            
            const label = document.createElement("label");
            label.htmlFor = itsId;
            label.appendChild(document.createTextNode(" "+clsName+'TEXT'));
            label.classList.add("whitespace-right-chkbox");


            const divElt = document.getElementById("checkboxes_div");
            if (divElt == null) {
                console.log("CHECKBOX DIV ELT NOT FOUND");
                return;
            }
            divElt.appendChild(newCheckbox);
            divElt.appendChild(label);
        }

    // Define your function
    function myLoadedFunction() {
      console.log("The entire page, including images and resources, has fully loaded.");

    // Add an event listener to the window object
    window.addEventListener('load', myLoadedFunction);
