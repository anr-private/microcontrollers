<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Raw Sensor Data</title>
</head>
<body>
    <h1>Raw Sensor Data</h1>

    <div id="NOTUSED__data-container" style="font-size: 24px; color: blue;">
      Time Now:&nbsp; <span id="date_time">date-and-time</span>
      <br>
      Internal temps:&nbsp; <span id="internal_temp_F">internal_temp_F</span> &nbsp;&nbsp;
      <span id="internal_temp_C">internal_temp_C</span>
    </div>
    <p>
       <button type="button" id="autoRefreshBtn">Auto Refresh</button> &nbsp; &nbsp;
       <button type="button" id="refreshDataBtn">Refresh theData</button> &nbsp; &nbsp;
       <button type="button" id="reloadPageBtn">Reload this Page</button> &nbsp; &nbsp;
       <a href="index.html"> BACK </a>
    </p>
    <p id="refresh-status">refresh-status</p>


    <script src="fetch_data_async.js"></script>
    <script>
        const dataUrl = "data?sensors=ALL"
        let auto_refresh_enabled = true;

        // Use setInterval to call fetchDataAndUpdate every 3000 milliseconds (3 seconds)
        // This function will run repeatedly until the window is closed or clearInterval() is called.
        // To pass an arg to the fetch function, using an anonymous go-between function.
        // () => { fff(); } - replaced by real function
        const intervalId = setInterval(auto_fetch_data, 60000);
        function auto_fetch_data() {
            if (auto_refresh_enabled) {
                console.log("AUTOREFRESH is ON!");
                do_fetch_data();
            } else {
                console.log("AUTOREFRESH is OFF!");
            }
        }

/* OLD        function do_fetch_data() {
            fetchDataAndUpdate(dataUrl);
            const statusElt = document.getElementById("refresh-status");
            statusElt.style.color = "red";
            statusElt.innerHTML = "Page is refreshing...";
        }*/
        function do_fetch_data() {
            fetchDataAsync(dataUrl, handleFetchedDataCB);
            const statusElt = document.getElementById("refresh-status");
            statusElt.style.color = "red";
            statusElt.innerHTML = "Page is refreshing...";
        }
        function handleFetchedDataCB(data) {  // invoked by fetchDataAndUpdate
            const statusElt = document.getElementById("refresh-status");
            statusElt.style.color = "black";
            statusElt.innerHTML = "Page refreshed.";

            console.log("FETCHED DATA:...");
            console.log(data);
            var eltDatetime = document.getElementById('date_time');
            eltDatetime.innerText = `${data.datetime}`;
            var eltTempC = document.getElementById('internal_temp_C');
            eltTempC.innerText = `${data.internal_temp_c} °C`;
            var eltTempF = document.getElementById('internal_temp_F');
            eltTempF.innerText = `${data.internal_temp_f} °F`;
        }

        function handleAutoRefreshBtnClick() {
            if (auto_refresh_enabled) {
                auto_refresh_enabled = false;
            } else {
                auto_refresh_enabled = true;
            }
            console.log("AUTOREFRESH state is " + auto_refresh_enabled);

            const btnElt = document.getElementById("autoRefreshBtn");
            if (auto_refresh_enabled) {
                btnElt.style.color = "black";
                btnElt.style.backgroundColor = "white";
            } else {
                btnElt.style.color = "red";
                btnElt.style.backgroundColor = "yellow";
            }
        }
        const autoRefreshBtnElt = document.getElementById("autoRefreshBtn");
        autoRefreshBtnElt.addEventListener("click", handleAutoRefreshBtnClick);

        function handleRefreshDataBtnClick() {
            do_fetch_data();
        }
        const refreshDataBtnElt = document.getElementById("refreshDataBtn");
        refreshDataBtnElt.addEventListener("click", handleRefreshDataBtnClick);

        function handleReloadPageBtnClick() {
            window.location.reload()
        }
        const reloadPageBtnElt = document.getElementById("reloadPageBtn");
        reloadPageBtnElt.addEventListener("click", handleReloadPageBtnClick);

    // Define your function
    function myLoadedFunction() {
      console.log("The entire page, including images and resources, has fully loaded.");
      do_fetch_data();
    }
    // Add an event listener to the window object
    window.addEventListener('load', myLoadedFunction);

    </script>
</body>
</html>
