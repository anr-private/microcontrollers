<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Timeout Example page</title>
</head>
<body>

    <h1>Live Digital Clock</h1>
    <div id="clock">Loading...</div>
    <button onclick="stopClock()">Stop Clock</button>
    <button onclick="startClock()">Start Clock</button>

    <script>
        // Function to update the clock display
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString(); // Formats the time nicely
            
            // Update the clock element with the current time
            const clockElement = document.getElementById('clock');
            if (clockElement) {
                clockElement.textContent = timeString;
            }
        }

        // Update clock immediately on page load
        updateClock();

        // Set interval to update clock every second (1000 milliseconds)
        var clockInterval = setInterval(updateClock, 1000);

        // Function to stop the clock using clearInterval()
        function stopClock() {
            clearInterval(clockInterval);
            console.log('Clock stopped');
            document.getElementById('clock').textContent += " (Stopped)";
        }
        function startClock() {
            clockInterval = setInterval(updateClock, 1000);
            console.log('Clock started');
            document.getElementById('clock').textContent = " (Started)";
        }
    </script>

</body>
</html>
