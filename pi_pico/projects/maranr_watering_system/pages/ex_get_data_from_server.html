<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requests Data from Server</title>
</head>
<body>
    <h1>Requests data from server w/o page reload.</h1>
    <p>The time below is updated every 3 seconds without a full page reload.</p>
    <div id="data-container" style="font-size: 24px; color: blue;">
        Loading...
    </div>

    <script src="fetch_data_and_update.js"></script>
    <script>
        // Use setInterval to call fetchDataAndUpdate every 3000 milliseconds (3 seconds)
        // This function will run repeatedly until the window is closed or clearInterval() is called.
        const intervalId = setInterval(fetchDataAndUpdate, 3000);

        // Optional: Call the function immediately when the page loads for the first update
        //console.log("FIRST CALL TO THE FETCH");
        fetchDataAndUpdate();

    </script>
</body>
</html>
